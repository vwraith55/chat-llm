name: flake8
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 chat.py tools/
